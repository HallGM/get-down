services:
  db:
    image: postgres:16-alpine
    container_name: get-down-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: get_down
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d get_down"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
